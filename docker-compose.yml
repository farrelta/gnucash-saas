version: '3.8'

services:
  traefik:
    image: traefik:v2.11
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"  # Dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - letsencrypt:/letsencrypt
    networks:
      - gnucash-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gnucash-backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${USER_DATA_PATH:-/opt/gnucash-data}:/opt/gnucash-data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.backend.priority=10"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"
      # Fallback router for /session/ — catches requests for sessions
      # whose dynamic XPRA routers no longer exist (expired / invalid).
      # Priority 50 keeps it below dynamic session routers (100) but
      # above the frontend catch-all (1).
      - "traefik.http.routers.backend-sessions.rule=PathPrefix(`/session/`)"
      - "traefik.http.routers.backend-sessions.entrypoints=websecure"
      - "traefik.http.routers.backend-sessions.tls.certresolver=letsencrypt"
      - "traefik.http.routers.backend-sessions.priority=50"
    depends_on:
      - traefik
    networks:
      - gnucash-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gnucash-frontend
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.frontend.priority=1"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
    depends_on:
      - backend
    networks:
      - gnucash-net

volumes:
  letsencrypt:

networks:
  gnucash-net:
    external: true
